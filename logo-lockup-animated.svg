<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 130" width="1060" height="130" role="img" aria-labelledby="title desc">
  <title id="title">Animated BidFrame logo</title>
  <desc id="desc">The BidFrame frame mark draws in, then the BIDFRAME wordmark reveals from left to right.</desc>
  <style>
    :root {
      color: #000;
    }

    .mark {
      fill: none;
      stroke: currentColor;
      stroke-width: 9;
      stroke-linecap: square;
      stroke-linejoin: miter;
      vector-effect: non-scaling-stroke;
    }

    .frame {
      stroke-dasharray: 480;
      stroke-dashoffset: 480;
      animation: draw-frame 3.6s cubic-bezier(.65, 0, .2, 1) infinite;
    }

    .rail {
      stroke-dasharray: 130;
      stroke-dashoffset: 130;
      animation: draw-rail 3.6s cubic-bezier(.65, 0, .2, 1) infinite;
    }

    .rail.top {
      animation-delay: .2s;
      color: #067a75;
    }

    .rail.middle {
      animation-delay: .35s;
    }

    .rail.bottom {
      animation-delay: .5s;
      color: #067a75;
    }

    .rail.top {
      animation-name: draw-rail, swap-top-rail;
      animation-duration: 3.6s, 3.6s;
      animation-timing-function: cubic-bezier(.65, 0, .2, 1), cubic-bezier(.65, 0, .2, 1);
      animation-iteration-count: infinite, infinite;
    }

    .rail.bottom {
      animation-name: draw-rail, swap-bottom-rail;
      animation-duration: 3.6s, 3.6s;
      animation-timing-function: cubic-bezier(.65, 0, .2, 1), cubic-bezier(.65, 0, .2, 1);
      animation-iteration-count: infinite, infinite;
    }

    .wordmark {
      fill: currentColor;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 800;
      font-size: 140px;
      letter-spacing: 14px;
      opacity: 0;
      clip-path: url(#word-reveal);
      animation: word-fade 3.6s ease infinite;
    }

    #reveal-bar {
      animation: reveal-word 3.6s cubic-bezier(.65, 0, .2, 1) infinite;
    }

    @keyframes draw-frame {
      0%, 8% {
        stroke-dashoffset: 480;
        opacity: 1;
      }
      28%, 78% {
        stroke-dashoffset: 0;
        opacity: 1;
      }
      92%, 100% {
        stroke-dashoffset: 0;
        opacity: 0;
      }
    }

    @keyframes draw-rail {
      0%, 12% {
        stroke-dashoffset: 130;
        opacity: 1;
      }
      30%, 78% {
        stroke-dashoffset: 0;
        opacity: 1;
      }
      92%, 100% {
        stroke-dashoffset: 0;
        opacity: 0;
      }
    }

    @keyframes reveal-word {
      0%, 28% {
        width: 0;
      }
      56%, 78% {
        width: 870px;
      }
      92%, 100% {
        width: 870px;
      }
    }

    @keyframes swap-top-rail {
      0%, 34% {
        transform: translateY(0);
      }
      52%, 78% {
        transform: translateY(60px);
      }
      92%, 100% {
        transform: translateY(0);
      }
    }

    @keyframes swap-bottom-rail {
      0%, 34% {
        transform: translateY(0);
      }
      52%, 78% {
        transform: translateY(-60px);
      }
      92%, 100% {
        transform: translateY(0);
      }
    }

    @keyframes word-fade {
      0%, 26% {
        opacity: 0;
      }
      36%, 78% {
        opacity: 1;
      }
      92%, 100% {
        opacity: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .frame,
      .rail,
      .wordmark,
      #reveal-bar {
        animation: none;
      }

      .frame,
      .rail {
        stroke-dashoffset: 0;
        transform: none;
      }

      .wordmark {
        opacity: 1;
      }

      #reveal-bar {
        width: 870px;
      }
    }
  </style>
  <defs>
    <clipPath id="word-reveal">
      <rect id="reveal-bar" x="180" y="0" width="0" height="130"/>
    </clipPath>
  </defs>
  <g class="mark">
    <line class="rail middle" x1="5" y1="65" x2="125" y2="65"/>
    <rect class="frame" x="5" y="5" width="120" height="120"/>
    <line class="rail top" x1="30" y1="35" x2="100" y2="35"/>
    <line class="rail bottom" x1="30" y1="95" x2="100" y2="95"/>
  </g>
  <text class="wordmark" x="180" y="115">BIDFRAME</text>
</svg>
