<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    position: relative;
    background: #f6f3ec;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: #11110f;
    padding: 66px 70px;
  }
  .masthead { display: flex; align-items: center; gap: 22px; }
  .masthead svg { width: 52px; height: 52px; }
  .masthead b { display: block; font-size: 36px; font-weight: 800; letter-spacing: 5px; }
  .masthead small {
    display: block;
    margin-top: 7px;
    font-family: "SFMono-Regular", Menlo, Consolas, monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #67645c;
  }
  h1 {
    margin-top: 58px;
    font-size: 92px;
    font-weight: 800;
    letter-spacing: -4px;
    line-height: 1.12;
  }
  h1 mark {
    background: #fff1d8;
    color: #11110f;
    padding: 0 10px 2px;
    margin-left: -10px;
    box-shadow: inset 0 -8px 0 #e49b2f;
  }
  .chips { display: flex; gap: 16px; margin-top: 46px; }
  .chip {
    padding: 13px 20px;
    border: 2px solid;
    font-family: "SFMono-Regular", Menlo, Consolas, monospace;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 2px;
  }
  .chip.crew { color: #8b641f; background: #fff1d8; border-color: #8b641f; }
  .chip.talent { color: #b24a3b; background: #f7e4df; border-color: #b24a3b; }
  .chip.credit { color: #496b55; background: #e2ece4; border-color: #496b55; }
  .site {
    position: absolute;
    left: 70px; bottom: 52px;
    font-family: "SFMono-Regular", Menlo, Consolas, monospace;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #67645c;
  }
  .bar { position: absolute; left: 0; bottom: 0; width: 1200px; height: 18px; background: #11110f; }
</style>
</head>
<body>
  <div class="masthead">
    <svg viewBox="0 0 52 52" stroke="#11110f" stroke-width="4" fill="none">
      <rect x="2" y="2" width="48" height="48"/>
      <line x1="14" y1="15" x2="38" y2="15"/>
      <line x1="2" y1="26" x2="50" y2="26"/>
      <line x1="14" y1="37" x2="38" y2="37"/>
    </svg>
    <span><b>BIDFRAME</b><small>BIDDING SOFTWARE FOR COMMERCIAL PRODUCTION</small></span>
  </div>
  <h1>Every rate sourced.<br><mark>Every gap flagged.</mark></h1>
  <div class="chips">
    <span class="chip crew">CREW COVERAGE</span>
    <span class="chip talent">TALENT USAGE</span>
    <span class="chip credit">TAX INCENTIVE</span>
  </div>
  <div class="site">BIDFRAME.CO</div>
  <div class="bar"></div>
</body>
</html>
